# =============================================================================
# Pipeline de entrega com GitHub Actions (substitui Jenkins no laboratório).
#
# O que faz:
#   - Checkout do repositório
#   - Configura kubectl com um kubeconfig armazenado em Secret
#   - Aplica k8s/deployment.yaml e k8s/prometheus.yaml
#   - Aguarda rollout dos Deployments
#
# Configuração no GitHub (Settings → Secrets and variables → Actions):
#   KUBE_CONFIG — conteúdo completo do arquivo ~/.kube/config (cole o YAML).
#                 Alternativa: use KUBE_CONFIG_B64 (kubeconfig em base64) e
#                 descomente o bloco correspondente no job abaixo.
#
# Opcional (build + push Docker Hub antes do deploy):
#   DOCKERHUB_USERNAME, DOCKERHUB_TOKEN — descomente o job "build-push-image".
# =============================================================================
name: Deploy Kubernetes (default namespace)

on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

env:
  K8S_NAMESPACE: default

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      - name: Configurar acesso ao cluster
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.kube"
          if [[ -z "$KUBE_CONFIG" ]]; then
            echo "Defina o secret KUBE_CONFIG no repositório (Settings → Secrets → Actions)."
            exit 1
          fi
          echo "$KUBE_CONFIG" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl version --client
          kubectl cluster-info || true

      # Se preferir secret em base64, comente o bloco acima e use:
      # - name: Configurar kubeconfig (base64)
      #   run: |
      #     mkdir -p "$HOME/.kube"
      #     echo "${{ secrets.KUBE_CONFIG_B64 }}" | base64 -d > "$HOME/.kube/config"
      #     chmod 600 "$HOME/.kube/config"

      - name: Aplicar Kubernetes
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/prometheus.yaml

      - name: Aguardar rollout
        run: |
          set -euo pipefail
          kubectl rollout status deployment/guia-app -n "$K8S_NAMESPACE" --timeout=300s
          kubectl rollout status deployment/prometheus -n "$K8S_NAMESPACE" --timeout=300s
          kubectl rollout status deployment/grafana -n "$K8S_NAMESPACE" --timeout=300s
          kubectl get pods,svc -n "$K8S_NAMESPACE"

  # ---------------------------------------------------------------------------
  # Job opcional — descomente o bloco "needs" em deploy se quiser build antes.
  # Requer secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
