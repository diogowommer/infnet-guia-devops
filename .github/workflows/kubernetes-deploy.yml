# =============================================================================
# Pipeline de entrega com GitHub Actions (substitui Jenkins no laboratório).
#
# O que faz:
#   - Checkout do repositório
#   - Build e push da imagem Docker no Docker Hub
#   - Configura kubectl com um kubeconfig armazenado em Secret
#   - Aplica k8s/deployment.yaml e k8s/prometheus.yaml
#   - Atualiza o Deployment para a imagem recém-publicada
#   - Aguarda rollout dos Deployments
#
# Configuração no GitHub (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME — usuário do Docker Hub.
#   DOCKERHUB_TOKEN    — token do Docker Hub.
#   KUBE_CONFIG — conteúdo completo do arquivo ~/.kube/config (cole o YAML).
#                 Alternativa: use KUBE_CONFIG_B64 (kubeconfig em base64) e
#                 descomente o bloco correspondente no job abaixo.
# =============================================================================
name: Deploy Kubernetes (default namespace)

on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

env:
  K8S_NAMESPACE: default
  IMAGE_NAME: diogowommer/infnet-guia-devops

jobs:
  build-push-image:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Definir imagem
        id: image
        run: |
          set -euo pipefail
          echo "image=${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build e push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: build-push-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      - name: Configurar acesso ao cluster
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.kube"
          if [[ -z "$KUBE_CONFIG" ]]; then
            echo "Defina o secret KUBE_CONFIG no repositório (Settings → Secrets → Actions)."
            exit 1
          fi
          printf '%s' "$KUBE_CONFIG" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl version --client
          kubectl cluster-info || true

      # Se preferir secret em base64, comente o bloco acima e use:
      # - name: Configurar kubeconfig (base64)
      #   run: |
      #     mkdir -p "$HOME/.kube"
      #     echo "${{ secrets.KUBE_CONFIG_B64 }}" | base64 -d > "$HOME/.kube/config"
      #     chmod 600 "$HOME/.kube/config"

      - name: Aplicar Kubernetes
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          kubectl apply -f k8s/prometheus.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl set image deployment/guia-app app="${{ needs.build-push-image.outputs.image }}" -n "$K8S_NAMESPACE"

      - name: Aguardar rollout
        run: |
          set -euo pipefail
          kubectl rollout status deployment/guia-app -n "$K8S_NAMESPACE" --timeout=300s
          kubectl rollout status deployment/prometheus -n "$K8S_NAMESPACE" --timeout=300s
          kubectl rollout status deployment/grafana -n "$K8S_NAMESPACE" --timeout=300s
          kubectl get pods,svc,pvc -n "$K8S_NAMESPACE"
